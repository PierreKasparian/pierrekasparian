# The host-level reverse proxy (Caddy/nginx running for another site) is the
# entrypoint on 80/443. This stack only exposes the app on the shared `proxy`
# network — no port binding here, no second Caddy.
#
# Pre-req on the VPS:
#   docker network create proxy
#   docker network connect proxy <existing_caddy_or_nginx_container>

networks:
  proxy:
    external: true

services:
  app:
    image: ${APP_IMAGE:-ghcr.io/pierrekasparian/pierrekasparian:latest}
    build:
      context: .
    container_name: pierrekasparian-app
    restart: unless-stopped
    # Secrets runtime (CONTACT_EMAIL_*). Compose lit .env pour la substitution
    # dans ce fichier, mais n'injecte rien dans le conteneur sans env_file.
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    networks:
      - proxy
    expose:
      - "3000"

name: CI - Build & Lint

on:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "data/**"
      - "dictionaries/**"
      - "public/**"
      - "Dockerfile"
      - "docker-compose*.yml"
      - ".github/workflows/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "tsconfig.json"

jobs:
  lint:
    name: Lint (TypeScript / ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Next 16 requires Node >=20.9 (engines field in next/package.json).
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build:
    name: Build Docker image (validation only)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ghcr.io/pierrekasparian/pierrekasparian:pr-${{ github.event.pull_request.number }}
          # GHA layer cache — scoped to this repo so PRs share the builder cache.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Add NEXT_PUBLIC_* build-args here when needed:
          # build-args: |
          #   NEXT_PUBLIC_EXAMPLE=${{ secrets.NEXT_PUBLIC_EXAMPLE }}

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: All checks passed
        run: |
          echo "✅ All CI checks passed — ready to merge 🚀"
